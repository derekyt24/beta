<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 16 &#8211; Apple beta timelines</title>
    <link rel="icon" type="image/x-icon" href="/assets/20260627-sitegraphic-updates.png">
    <link rel="stylesheet" href="https://beta.derekyt.dev/assets/fonts/sf-pro.css">
    <style>
        * {
            box-sizing:border-box;
        }

        body {
            min-height:100vh;
            margin:0;
            padding:30px;
            display:flex;
            flex-direction:column;
            background-position:center;
            background-size:cover;
            background-repeat:no-repeat;
            background-attachment:fixed;
            color:#ffffff;
            font-family:"SF Pro", "Inter", sans-serif;
            text-align:center;
        }

        @media (max-width:600px) and (prefers-color-scheme: light) {
            body {
                background-image:url('https://beta.derekyt.dev/assets/bg-images/apple-beta-timelines-ios-16-wallpaper-light-mobile.png');
                background-color:#0a1015;
                padding-left:15px;
                padding-right:15px;
                color: #ffffff;
            }
            nav {
                font-size:14px;
            }

            a:link, a:visited {
                color: #ffffff;
            }

            .nav-links a {
                color: #ffffff;
            }

            .nav-brand {
                color: #ffffff;
            }

        }

        @media (min-width:601px) and (prefers-color-scheme: light) {
            body {
                background-image:url('https://beta.derekyt.dev/assets/bg-images/apple-beta-timelines-ios-16-wallpaper-light-desktop.png');
                background-color:#0a1015;
                color: #ffffff;
            }
            nav {
                font-size:14px;
            }

            a:link, a:visited {
                color: #ffffff;
            }

            .nav-links a {
                color: #ffffff;
            }

            .nav-brand {
                color: #ffffff;
            }
        }

        @media (max-width:600px) and (prefers-color-scheme: dark) {
            body {
                background-image:url('https://beta.derekyt.dev/assets/bg-images/apple-beta-timelines-ios-16-wallpaper-dark-mobile.png');
                background-color:#0a1015;
                padding-left:15px;
                padding-right:15px;
                color: #ffffff;
            }
            nav {
                font-size:14px;
            }

            a:link, a:visited {
                color: #ffffff;
            }

            .nav-links a {
                color: #ffffff;
            }

            .nav-brand {
                color: #ffffff;
            }

        }

        @media (min-width:601px) and (prefers-color-scheme: dark) {
            body {
                background-image:url('https://beta.derekyt.dev/assets/bg-images/apple-beta-timelines-ios-16-wallpaper-dark-desktop.png');
                background-color:#0a1015;
                color: #ffffff;
            }
            nav {
                font-size:14px;
            }

            a:link, a:visited {
                color: #ffffff;
            }

            .nav-links a {
                color: #ffffff;
            }

            .nav-brand {
                color: #ffffff;
            }
        }

        nav {
            display:flex;
            align-items:center;
            justify-content:space-between;
            width:min(100%, 750px);
            margin:0 auto;
            font-size:14px;
        }

        .nav-brand {
            font-weight:500;
            text-decoration:none;
            letter-spacing:0.25px;
        }

        .nav-links {
            display:flex;
            gap:12px;
            letter-spacing:0.25px;
        }

        a {
            color:inherit;
            text-decoration:none;
        }

        .nav-links a {
            opacity:0.72;
        }

        .nav-links a:hover,
        .nav-links a:focus-visible {
            opacity:1;
        }

        main {
            flex:1;
            width:min(100%, 750px);
            margin:30px auto 0;
        }

        h1 {
            margin:0;
            font-size:64px;
            font-weight:550;
            letter-spacing:0em;
            line-height:1.1;
        }

        .version-picker {
            display:block;
            margin:7px auto 10px;
        }

        .version-picker select {
            appearance:none;
            -webkit-appearance:none;
            margin:0;
            padding:6px 28px 6px 8px;
            border:0;
            background:transparent;
            color:inherit;
            font-family:inherit;
            font-size:21px;
            font-weight:500;
            line-height:1.2;
            text-align:center;
            cursor:pointer;
        }

        .version-picker span {
            display:inline-grid;
            position:relative;
        }

        .version-picker svg {
            position:absolute;
            top:50%;
            right:10px;
            width:14px;
            height:14px;
            transform:translateY(-50%);
            pointer-events:none;
        }

        .release-grid {
            display:grid;
            width:100%;
            grid-template-columns:repeat(2, minmax(0, 1fr));
            justify-content:initial;
            row-gap:var(--timeline-row-gap, 22px);
            column-gap:0;
            align-items:start;
        }

        .release-align-left {
            text-align:left;
            padding-left:50px;
        }

        .release-align-right {
            text-align:right;
            padding-right:50px;
        }

        .release-pair {
            display:grid;
            grid-column:1 / -1;
            grid-template-columns:repeat(2, minmax(0, 1fr));
            gap:22px 20px;
        }

        .release-pair-compact {
            grid-template-columns:repeat(2, max-content);
            justify-content:center;
            column-gap:50px;
        }

        .release-pair-builds,
        .release-pair-tight {
            grid-template-columns:repeat(2, max-content);
            justify-content:center;
        }

        .release-pair-builds {
            column-gap:100px;
        }

        .release-pair-tight {
            column-gap:50px;
        }

        .release-trio {
            display:grid;
            grid-column:1 / -1;
            grid-template-columns:repeat(3, max-content);
            justify-content:center;
            column-gap:50px;
        }

        .supplemental .release-trio + .release-trio {
            margin-top:24px;
        }

        .release-name,
        .section-label {
            margin:0 0 5px;
            color:rgba(255, 255, 255, 0.67);
            font-size:18px;
            font-weight:400;
            letter-spacing:0.05em;
        }

        .release-date {
            margin:0;
            font-size:28px;
            font-weight:400;
            letter-spacing:0em;
        }

        .release-note {
            margin:4px 0 0;
            color:rgba(255, 255, 255, 0.67);
            font-size:14px;
            letter-spacing:0.03em;
            line-height:1.35;
            white-space:pre-line;
        }

        .release-align-left {
            text-align:left;
        }

        .release-align-right {
            text-align:right;
        }

        .span-two {
            grid-column:1 / -1;
        }

        .supplemental {
            margin-top:6px;
            margin-bottom:20px;
        }

        .supplemental .section-label {
            font-size:21px;
            margin-bottom:15px;
            letter-spacing:0.01em;
            color:rgba(255, 255, 255, 0.75);
        }

        .timeline-message {
            margin:20px 0;
            color:rgba(255, 255, 255, 0.72);
            font-size:18px;
        }

        @media (max-width:600px) {
            body {
                padding-left:25px;
                padding-right:25px;
                background-attachment:scroll;
            }

            nav {
                font-size:14px;
            }

            .nav-links {
                gap:12px;
            }

            main {
                margin-top:30px;
            }

            h1 {
                font-size:44px;
            }

            .version-picker {
                margin:7px auto 10px;
            }

            .version-picker select {
                font-size:19px;
            }

            .release-grid {
                grid-template-columns:repeat(2, minmax(0, 1fr));
                justify-content:initial;
                row-gap:var(--timeline-row-gap-mobile, 20px);
                column-gap:var(--timeline-column-gap-mobile, 28px);
            }

            .release-pair {
                gap:20px 28px;
            }

            .release-pair-builds,
            .release-pair-tight {
                grid-template-columns:repeat(2, max-content);
                justify-content:center;
                column-gap:20px;
            }

            .release-trio {
                grid-template-columns:1fr;
                row-gap:20px;
            }

            .supplemental .release-trio + .release-trio {
                margin-top:20px;
            }

            .release-name,
            .section-label {
                font-size:12px;
            }

            .release-date {
                font-size:18px;
                letter-spacing:0.25px;
            }

            .release-note {
                font-size:10px;
            }

            .release-align-left {
                padding-left:0;
            }

            .release-align-right {
                padding-right:0;
            }

            .supplemental .section-label {
                font-size:16px;
                margin-bottom:12px;
            }
        }

        @media (max-width:380px) {
            body {
                padding-left:15px;
                padding-right:15px;
            }

            .release-grid {
                row-gap:18px;
                column-gap:16px;
            }

            .release-pair {
                column-gap:16px;
            }

            .release-pair-builds,
            .release-pair-tight {
                column-gap:12px;
            }

            .release-date {
                font-size:17px;
                letter-spacing:0;
            }

            .supplemental .section-label {
                font-size:15px;
            }
        }
        .timeline-footnote {
            width:min(100%, 750px);
            margin:20px auto 0;
            color:rgba(255, 255, 255, 0.75);
            font-size:16px;
            font-weight:400;
            letter-spacing:0.01em;
        }

        @media (max-width:600px) {
            .timeline-footnote {
                font-size:13px;
            }
        }
        /* iOS 15 typography calibration. */
        .release-name {
            font-weight:500;
            letter-spacing:0.03em;
        }

        .release-date {
            color:rgba(255, 255, 255, 0.9);
        }

        .release-note {
            letter-spacing:0.04em;
            line-height:1.35;
        }

        .section-label {
            font-weight:400;
            letter-spacing:0.03em;
        }

        .release-name,
        .release-date,
        .release-note {
            font-optical-sizing:none;
        }

        @media (max-width:600px) {
            .release-date {
                letter-spacing:0;
            }

            .release-name,
            .release-date,
            .release-note {
                font-optical-sizing:none;
                line-height:1.13;
            }
        }


    </style>
</head>
<body>
    <nav aria-label="Main navigation">

    <main>
        <h1>iOS 16</h1>
        <label class="version-picker" for="software-version">

                    {
                        pair: [
                            { date: "iOS 16.7.15", note: "Final build: Mar 11, 2026" },
                            { date: "iOS 16.7.16", note: "Final build: May 11, 2026" }

                ]

        };

        const versionSelect = document.getElementById("software-version");
        const releaseGrid = document.getElementById("release-grid");
        const timelineFootnote = document.getElementById("timeline-footnote");

        function releaseMarkup(release) {
            if (release.trio) {
                const className = release.className ? ` ${release.className}` : "";
                return `<div class="release-trio${className}">${release.trio.map(releaseMarkup).join("")}</div>`;
            }

            if (release.pair) {
                const className = release.className ? ` ${release.className}` : "";
                return `<div class="release-pair${className}">${release.pair.map(releaseMarkup).join("")}</div>`;
            }

            const spanClass = release.spanTwo ? " span-two" : "";
            const alignmentClass = release.alignment ? ` release-align-${release.alignment}` : "";
            const name = release.name ? `<p class="release-name">${release.name}</p>` : "";
            const note = release.note ? `<p class="release-note">${release.note}</p>` : "";
            return `<article class="release${spanClass}${alignmentClass}">
                ${name}
                <p class="release-date">${release.date}</p>${note}
            </article>`;
        }

        function renderTimeline() {
            const timeline = timelines[versionSelect.value];

            if (!timeline) {
                releaseGrid.setAttribute("aria-label", "Timeline coming soon");
                releaseGrid.innerHTML = '<p class="timeline-message span-two">This timeline is coming soon.</p>';
                timelineFootnote.hidden = true;
                timelineFootnote.textContent = "";
                return;
            }

            releaseGrid.setAttribute("aria-label", `${timeline.label} release dates`);
            timelineFootnote.textContent = timeline.footnote ?? "";
            timelineFootnote.hidden = !timeline.footnote;
            releaseGrid.style.setProperty("--timeline-row-gap", timeline.rowGap ?? "22px");
            releaseGrid.style.setProperty("--timeline-row-gap-mobile", timeline.rowGapMobile ?? "20px");
            let markup = timeline.releases.map(releaseMarkup).join("");

            if (timeline.supplemental?.length) {
                markup += `<section class="span-two supplemental" aria-label="Supplemental releases">
                    <p class="section-label">supplemental releases</p>
                    ${timeline.supplemental.map(releaseMarkup).join("")}
                </section>`;
            }

            releaseGrid.innerHTML = markup;
        }

        versionSelect.addEventListener("change", renderTimeline);
        renderTimeline();
    </script>
</body>
