<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iOS 26 &#8211; Apple beta timelines</title>
    <link rel="icon" type="image/x-icon" href="/assets/20260627-sitegraphic-updates.png">
    <link rel="stylesheet" href="https://beta.derekyt.dev/assets/fonts/sf-pro.css">
    <style>
        * {
            box-sizing:border-box;
        }

        body {
            min-height:100vh;
            margin:0;
            padding-top:30px;
            padding-left:30px;
            padding-right:30px;
            padding-bottom:35px;
            display:flex;
            flex-direction:column;
            background-position:center;
            background-size:cover;
            background-repeat:no-repeat;
            background-attachment:fixed;
            color:#ffffff;
            font-family:"SF Pro", "Inter", sans-serif;
            text-align:center;
        }

        @media (max-width:600px) and (prefers-color-scheme: light) {
            body {
                background-image:url('https://beta.derekyt.dev/assets/bg-images/apple-beta-timelines-ios-26-wallpaper-light-mobile.png');
                background-color:#0a1015;
                padding-left:15px;
                padding-right:15px;
                color: #ffffff;
            }
            nav {
                font-size:14px;
            }

            a:link, a:visited {
                color: #ffffff;
            }

            .nav-links a {
                color: #ffffff;
            }

            .nav-brand {
                color: #ffffff;
            }

            hr {
                background-color: rgba(0, 0, 0, 1);
            }
        }

        @media (min-width:601px) and (prefers-color-scheme: light) {
            body {
                background-image:url('https://beta.derekyt.dev/assets/bg-images/apple-beta-timelines-ios-26-wallpaper-light-desktop.png');
                background-color:#0a1015;
                color: #ffffff;
            }
            nav {
                font-size:14px;
            }

            a:link, a:visited {
                color: #ffffff;
            }

            .nav-links a {
                color: #ffffff;
            }

            .nav-brand {
                color: #ffffff;
            }

            hr {
                background-color: rgba(0, 0, 0, 1);
            }
        }

        @media (max-width:600px) and (prefers-color-scheme: dark) {
            body {
                background-image:url('https://beta.derekyt.dev/assets/bg-images/apple-beta-timelines-ios-26-wallpaper-dark-mobile.png');
                background-color:#0a1015;
                padding-left:15px;
                padding-right:15px;
                color: #ffffff;
            }
            nav {
                font-size:14px;
            }

            a:link, a:visited {
                color: #ffffff;
            }

            .nav-links a {
                color: #ffffff;
            }

            .nav-brand {
                color: #ffffff;
            }

            hr {
                background-color: rgba(255, 255, 255, 1);
            }
        }

        @media (min-width:601px) and (prefers-color-scheme: dark) {
            body {
                background-image:url('https://beta.derekyt.dev/assets/bg-images/apple-beta-timelines-ios-26-wallpaper-dark-desktop.png');
                background-color:#0a1015;
                color: #ffffff;
            }
            nav {
                font-size:14px;
            }

            a:link, a:visited {
                color: #ffffff;
            }

            .nav-links a {
                color: #ffffff;
            }

            .nav-brand {
                color: #ffffff;
            }

            hr {
                background-color: rgba(255, 255, 255, 1);
            }
        }

        nav {
            display:flex;
            align-items:center;
            justify-content:space-between;
            width:min(100%, 750px);
            margin:0 auto;
            font-size:14px;
        }

        .nav-brand {
            font-weight:500;
            text-decoration:none;
            letter-spacing:0.25px;
        }

        .nav-links {
            display:flex;
            gap:12px;
            letter-spacing:0.25px;
        }

        a {
            color:inherit;
            text-decoration:none;
        }

        .nav-links a {
            opacity:0.72;
        }

        .nav-links a:hover,
        .nav-links a:focus-visible {
            opacity:1;
        }

        main {
            flex:1;
            width:min(100%, 700px);
            margin:30px auto 0;
        }

        h1 {
            margin:0;
            font-size:64px;
            font-weight:550;
            letter-spacing:0em;
            line-height:1.1;
        }

        .version-picker {
            display:block;
            margin:7px auto 10px;
        }

        .version-picker select {
            appearance:none;
            -webkit-appearance:none;
            margin:0;
            padding:6px 28px 6px 8px;
            border:0;
            background:transparent;
            color:inherit;
            font-family:inherit;
            font-size:21px;
            font-weight:500;
            line-height:1.2;
            text-align:center;
            cursor:pointer;
        }

        .version-picker span {
            display:inline-grid;
            position:relative;
        }

        .version-picker svg {
            position:absolute;
            top:50%;
            right:10px;
            width:14px;
            height:14px;
            transform:translateY(-50%);
            pointer-events:none;
        }

        .release-grid {
            display:grid;
            grid-template-columns:repeat(2, minmax(0, 1fr));
            gap:22px 80px;
            align-items:start;
        }

        .release-pair {
            display:grid;
            grid-column:1 / -1;
            grid-template-columns:repeat(2, minmax(0, 1fr));
            gap:22px 80px;
        }

        .release-pair-builds,
        .release-pair-tight {
            grid-template-columns:repeat(2, max-content);
            justify-content:center;
        }

        .release-pair-builds {
            column-gap:100px;
        }

        .release-pair-tight {
            column-gap:50px;
        }

        .release-name {
            margin:0 0 5px;
            color:rgba(255, 255, 255, 0.67);
            font-size:18px;
            font-weight:500;
            letter-spacing:0.03em;
        }

        .release-date {
            margin:0;
            font-size:28px;
            font-weight:400;
            letter-spacing:-0.01em;
        }

        .release-note {
            margin:4px 0 0;
            color:rgba(255, 255, 255, 0.67);
            font-size:16px;
            letter-spacing:0.01em;
        }

        .section-label {
            margin:0 0 5px;
            color:rgba(255, 255, 255, 0.67);
            font-size:18px;
            font-weight:400;
            letter-spacing:0.01em;
        }
        .span-two {
            grid-column:1 / -1;
        }

        .supplemental {
            margin-top:6px;
            margin-bottom:20px;
        }

        .supplemental .section-label {
            font-size:21px;
            margin-bottom:15px;
            color:rgba(255, 255, 255, 0.75);
        }

        .timeline-message {
            margin:20px 0;
            color:rgba(255, 255, 255, 0.72);
            font-size:18px;
        }

        @media (max-width:600px) {
            body {
                padding:20px 25px;
                padding-bottom:54px;
                background-attachment:scroll;
            }

            nav {
                font-size:14px;
            }

            .nav-links {
                gap:12px;
            }

            main {
                margin-top:30px;
            }

            h1 {
                font-size:44px;
            }

            .version-picker {
                margin:7px auto 10px;
            }

            .version-picker select {
                font-size:19px;
            }

            .release-grid {
                gap:20px 28px;
            }

            .release-pair {
                gap:20px 28px;
            }

            .release-pair-builds,
            .release-pair-tight {
                grid-template-columns:repeat(2, max-content);
                justify-content:center;
                column-gap:20px;
            }

            .release-name,
            .section-label {
                font-size:12px;
            }

            .release-date {
                font-size:18px;
                letter-spacing:0.25px;
            }

            .release-note {
                font-size:10px;
            }

            .release-name,
            .release-date,
            .release-note {
                font-optical-sizing:none;
            }

            .supplemental .section-label {
                font-size:16px;
                margin-bottom:12px;
            }
        }

        /* Narrow outer displays, including foldable cover screens. */
        @media (max-width:380px) {
            body {
                padding-left:12px;
                padding-right:12px;
            }

            .release-grid {
                gap:18px 16px;
            }

            .release-pair {
                column-gap:16px;
            }

            .release-pair-builds,
            .release-pair-tight {
                column-gap:12px;
            }

            .release-date {
                font-size:17px;
                letter-spacing:0;
            }

            .release-name,
            .release-date,
            .release-note {
                font-optical-sizing:none;
            }

            .supplemental .section-label {
                font-size:15px;
            }
        }
        .timeline-footnote {
            width:min(100%, 700px);
            color:rgba(255, 255, 255, 0.75);
            font-size:16px;
            font-weight:400;
            line-height:1.7;
            letter-spacing:0.01em;
        }

        .timeline-footnote {
            margin:30px auto 0;
        }

        .timeline-credit {
            color:rgba(255,255,255,0.33);
            font-size:12px;
            position:fixed;
            z-index:10;
            right:30px;
            bottom:max(16px, env(safe-area-inset-bottom));
            left:30px;
            width:auto;
            margin:0;
        }

        .timeline-credit a {
            color:inherit;
            text-decoration:none;
        }

        @media (max-width:600px) {
            .timeline-footnote,
            .timeline-credit {
                font-size:13px;
            }

            .timeline-credit {
                right:12px;
                bottom:max(12px, env(safe-area-inset-bottom));
                left:12px;
            }
        }
        /* iOS 15 typography calibration. */
        .release-name {
            font-weight:500;
            letter-spacing:0.03em;
        }

        .release-date {
            color:rgba(255, 255, 255, 0.9);
        }

        .release-note {
            letter-spacing:0.04em;
            line-height:1.35;
        }

        .section-label {
            font-weight:400;
            letter-spacing:0.03em;
        }

        .release-name,
        .release-date,
        .release-note {
            font-optical-sizing:none;
        }

        @media (max-width:600px) {
            .release-date {
                letter-spacing:0;
            }

            .release-name,
            .release-date,
            .release-note {
                font-optical-sizing:none;
                line-height:1.13;
            }
        }


    </style>
</head>
<body>
    <nav aria-label="Main navigation">
        <a class="nav-brand" href="/">DerekYT</a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/projects">Projects</a>
            <a href="/updates">Updates</a>
        </div>
    </nav>

    <main>
        <h1>iOS 26</h1>
        <label class="version-picker" for="software-version">
            <span>
                <select id="software-version" aria-label="Choose an iOS 26 version">
                    <option value="26-0">iOS 26.0</option>
                    <option value="26-1">iOS 26.1</option>
                    <option value="26-2">iOS 26.2</option>
                    <option value="26-3">iOS 26.3</option>
                    <option value="26-4">iOS 26.4</option>
                    <option value="26-5">iOS 26.5</option>
                    <option value="26-6">iOS 26.6</option>
                </select>
                <svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
                    <path d="M3 5.5 8 10.5l5-5" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" />
                </svg>
            </span>
        </label>

        <section id="release-grid" class="release-grid" aria-live="polite"></section>
    </main>
    <footer id="timeline-footnote" class="timeline-footnote" hidden></footer>
    <footer class="timeline-credit">
        Designed by <a href="https://x.com/derekyt_" target="_blank">@derekyt_</a> on X. Release info from <a href="https://appledb.dev" target="_blank">appledb.dev</a>, used under license.
    </footer>
    <script>
        const timelines = {
            "26-0": {
                label: "iOS 26.0",
                releases: [
                    { name: "iOS 26.0 beta 1", date: "Jun 9, 2025" },
                    { name: "iOS 26.0 beta 2", date: "Jun 23, 2025" },
                    { name: "iOS 26.0 beta 3", date: "Jul 7, 2025" },
                    { name: "iOS 26.0 beta 4, build 1", date: "Jul 22, 2025", note: "build 2: Jul 24, 2025" },
                    { name: "iOS 26.0 beta 5", date: "Aug 5, 2025" },
                    { name: "iOS 26.0 beta 6, build 1", date: "Aug 11, 2025", note: "build 2: Aug 14, 2025" },
                    { name: "iOS 26.0 beta 7", date: "Aug 18, 2025" },
                    { name: "iOS 26.0 beta 8", date: "Aug 25, 2025" },
                    { name: "iOS 26.0 beta 9", date: "Sep 2, 2025", spanTwo: true },
                    {
                        pair: [
                            { name: "iOS 26.0 RC build", date: "Sep 9, 2025" },
                            { name: "iOS 26.0 final build", date: "Sep 15, 2025" }
                        ],
                        className: "release-pair-builds"
                    }
                ],
                supplemental: [
                    { name: "iOS 26.0.1", date: "Sep 29, 2025" }
                ]
            },
            "26-1": {
                label: "iOS 26.1",
                releases: [
                    { name: "iOS 26.1 beta 1", date: "Sep 22, 2025" },
                    { name: "iOS 26.1 beta 2", date: "Oct 6, 2025" },
                    { name: "iOS 26.1 beta 3", date: "Oct 13, 2025" },
                    { name: "iOS 26.1 beta 4", date: "Oct 20, 2025" },
                    {
                        pair: [
                            { name: "iOS 26.1 RC build", date: "Oct 28, 2025" },
                            { name: "iOS 26.1 final build", date: "Nov 3, 2025" }
                        ],
                        className: "release-pair-builds"
                    }
                ]
            },
            "26-2": {
                label: "iOS 26.2",
                releases: [
                    { name: "iOS 26.2 beta 1", date: "Nov 4, 2025" },
                    { name: "iOS 26.2 beta 2", date: "Nov 12, 2025" },
                    { name: "iOS 26.2 beta 3", date: "Nov 17, 2025", spanTwo: true },
                    {
                        pair: [
                            { name: "iOS 26.2 RC build", date: "Dec 3, 2025" },
                            { name: "iOS 26.2 final build", date: "Dec 12, 2025" }
                        ],
                        className: "release-pair-builds"
                    }
                ],
                supplemental: [
                    { name: "iOS 26.2.1", date: "Jan 26, 2026" }
                ]
            },
            "26-3": {
                label: "iOS 26.3",
                releases: [
                    { name: "iOS 26.3 beta 1", date: "Dec 15, 2025" },
                    { name: "iOS 26.3 beta 2", date: "Jan 12, 2026" },
                    { name: "iOS 26.3 beta 3", date: "Jan 26, 2026", spanTwo: true },
                    {
                        pair: [
                            { name: "iOS 26.3 RC build", date: "Feb 4, 2026" },
                            { name: "iOS 26.3 final build", date: "Feb 11, 2026" }
                        ],
                        className: "release-pair-builds"
                    }
                ],
                supplemental: [
                    { name: "iOS 26.3.1", date: "Mar 4, 2026" }
                ]
            },
            "26-4": {
                label: "iOS 26.4",
                releases: [
                    { name: "iOS 26.4 beta 1", date: "Feb 16, 2026" },
                    { name: "iOS 26.4 beta 2", date: "Feb 23, 2026" },
                    { name: "iOS 26.4 beta 3", date: "Mar 2, 2026" },
                    { name: "iOS 26.4 beta 4", date: "Mar 9, 2026" },
                    {
                        pair: [
                            { name: "iOS 26.4 RC build", date: "Mar 18, 2026" },
                            { name: "iOS 26.4 final build", date: "Mar 24, 2026" }
                        ],
                        className: "release-pair-builds"
                    }
                ],
                supplemental: [
                    {
                        pair: [
                            { name: "iOS 26.4.1", date: "Apr 8, 2026" },
                            { name: "iOS 26.4.2", date: "Apr 22, 2026" }
                        ],
                        className: "release-pair-tight"
                    }
                ]
            },
            "26-5": {
                label: "iOS 26.5",
                footnote: "1: Released only for iPhone 17 models and iPhone Air.",
                releases: [
                    { name: "iOS 26.5 beta 1", date: "Mar 30, 2026", note: "build 2: Apr 3, 2026" },
                    { name: "iOS 26.5 beta 2", date: "Apr 13, 2026" },
                    { name: "iOS 26.5 beta 3", date: "Apr 20, 2026" },
                    { name: "iOS 26.5 beta 4", date: "Apr 27, 2026" },
                    {
                        pair: [
                            { name: "iOS 26.5 RC build", date: "May 4, 2026", note: "build 2: May 8, 2026" },
                            { name: "iOS 26.5 final build", date: "May 11, 2026" }
                        ],
                        className: "release-pair-builds"
                    }
                ],
                supplemental: [
                    {
                        pair: [
                            { name: "iOS 26.5.1&#185;", date: "Jun 1, 2026" },
                            { name: "iOS 26.5.2", date: "Jun 29, 2026" }
                        ],
                        className: "release-pair-tight"
                    }
                ]
            },
            "26-6": {
                label: "iOS 26.6",
                releases: [
                    { name: "iOS 26.6 beta 1", date: "May 26, 2026" },
                    { name: "iOS 26.6 beta 2", date: "Jun 15, 2026" },
                    { name: "iOS 26.6 beta 3", date: "Jun 29, 2026" },
                    { name: "iOS 26.6 beta 4", date: "Jul 6, 2026" },
                    { name: "iOS 26.6 beta 5", date: "Jul 13, 2026", spanTwo: true },
                ]
            },
        };

        const versionSelect = document.getElementById("software-version");
        const releaseGrid = document.getElementById("release-grid");
        const timelineFootnote = document.getElementById("timeline-footnote");

        function releaseMarkup(release) {
            if (release.pair) {
                const className = release.className ? ` ${release.className}` : "";
                return `<div class="release-pair${className}">${release.pair.map(releaseMarkup).join("")}</div>`;
            }

            const spanClass = release.spanTwo ? " span-two" : "";
            const note = release.note ? `<p class="release-note">${release.note}</p>` : "";
            return `<article class="release${spanClass}">
                <p class="release-name">${release.name}</p>
                <p class="release-date">${release.date}</p>${note}
            </article>`;
        }

        function renderTimeline() {
            const timeline = timelines[versionSelect.value];

            if (!timeline) {
                releaseGrid.setAttribute("aria-label", "Timeline coming soon");
                releaseGrid.innerHTML = '<p class="timeline-message span-two">This timeline is coming soon.</p>';
                timelineFootnote.hidden = true;
                timelineFootnote.textContent = "";
                return;
            }

            releaseGrid.setAttribute("aria-label", `${timeline.label} release dates`);
            timelineFootnote.textContent = timeline.footnote ?? "";
            timelineFootnote.hidden = !timeline.footnote;
            let markup = timeline.releases.map(releaseMarkup).join("");

            if (timeline.supplemental?.length) {
                markup += `<section class="span-two supplemental" aria-label="Supplemental releases">
                    <p class="section-label">supplemental releases</p>
                    ${timeline.supplemental.map(releaseMarkup).join("")}
                </section>`;
            }

            releaseGrid.innerHTML = markup;
        }

        versionSelect.addEventListener("change", renderTimeline);
        renderTimeline();
    </script>
</body>
</html>
